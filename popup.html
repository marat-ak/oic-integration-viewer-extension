<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 420px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #f8fafc;
  }
  .header {
    background: #1e293b;
    color: white;
    padding: 12px 16px;
  }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header p { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .section {
    padding: 14px 16px;
    border-bottom: 1px solid #e2e8f0;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .field { margin-bottom: 8px; }
  .field label {
    display: block;
    font-size: 11px;
    color: #64748b;
    margin-bottom: 3px;
  }
  .field input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'SF Mono', 'Consolas', monospace;
    outline: none;
  }
  .field input:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
  }
  .field input::placeholder {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #94a3b8;
  }
  .btn-primary {
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-secondary {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-secondary:hover { background: #e2e8f0; }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .toggle-label {
    font-size: 13px;
    line-height: 1.3;
  }
  .toggle-desc {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
  }
  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #cbd5e1;
    border-radius: 22px;
    transition: 0.2s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: #1a73e8;
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(18px);
  }
  .status {
    padding: 8px 16px;
    font-size: 11px;
    color: #64748b;
    text-align: center;
  }
  .theme-select {
    padding: 5px 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 12px;
    background: white;
    color: #1a1a1a;
    cursor: pointer;
    outline: none;
    flex-shrink: 0;
  }
  .theme-select:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
  }
  .status.error { color: #dc2626; background: #fef2f2; }
  .status.success { color: #166534; background: #dcfce7; }
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
  }
  .color-row label {
    flex: 1;
    font-size: 11px;
    color: #475569;
  }
  .color-row input[type="color"] {
    width: 28px;
    height: 22px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    padding: 1px;
    cursor: pointer;
    background: none;
  }
  .color-row .reset-btn {
    font-size: 10px;
    color: #94a3b8;
    cursor: pointer;
    border: none;
    background: none;
    padding: 2px 4px;
  }
  .color-row .reset-btn:hover { color: #dc2626; }
</style>
</head>
<body>
  <div class="header">
    <h1>OIC Integration Viewer</h1>
    <p>Blueprint tree viewer with search &amp; export</p>
  </div>

  <div class="section">
    <div class="section-title">Viewer</div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" id="openBtn" style="flex:1">Open Viewer</button>
      <button class="btn-secondary" id="importBtn">Import JSON</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Settings</div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Color theme</div>
        <div class="toggle-desc">Choose viewer appearance</div>
      </div>
      <select id="themeSelect" class="theme-select">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="high-contrast">High Contrast</option>
        <option value="solarized">Solarized</option>
      </select>
    </div>
    <div class="toggle-row" style="margin-top:10px">
      <div>
        <div class="toggle-label">XPath preview length</div>
        <div class="toggle-desc">Max chars shown inline (click to see full)</div>
      </div>
      <input type="number" id="maxXpathCharsInput" min="10" max="500" step="5" value="60"
             style="width:70px;padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;outline:none">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Activity Colors (per theme)</div>
    <div id="colorOverrides" style="max-height:200px;overflow-y:auto"></div>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
